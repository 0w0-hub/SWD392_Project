# Chay voi MySQL:  mvnw spring-boot:run -Dspring-boot.run.profiles=mysql
# Tao truoc database:  CREATE DATABASE customer_account_db;
spring.datasource.url=jdbc:mysql://localhost:3306/customer_account_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.h2.console.enabled=false
