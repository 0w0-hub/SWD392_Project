spring.application.name=customer-account-service
server.port=8081

# --- Database: H2 dang file, chay duoc ngay khong can cai dat gi them ---
spring.datasource.url=jdbc:h2:file:./data/customer-account-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Broker (service registry) ---
broker.enabled=true
broker.base-url=http://localhost:8080
broker.service-name=CustomerAccountService
broker.host=localhost
broker.heartbeat-interval=30s
broker.timeout=3s

# --- Swagger UI: http://localhost:8081/swagger-ui.html ---
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info

# Profile 'demo' nap san 2 khach hang + tai khoan de bam thu API ngay
spring.profiles.active=demo
