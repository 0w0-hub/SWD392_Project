spring.application.name=broker
server.port=8080

# Khong nhan heartbeat qua 90s -> coi service da chet, loai khoi registry.
# Phai lon hon chu ky heartbeat cua service (30s) du xa, de mot lan lo mat goi tin
# khong lam service bi loai oan.
registry.heartbeat-ttl-seconds=90
registry.sweep-interval-seconds=30

management.endpoints.web.exposure.include=health,info